# VA-02 — build the container image on every PR so a broken Dockerfile blocks merge.
# (VA-08 adds the lint + unit-test PR checks.)
name: docker-image

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (with layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: voice-ai-agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — container serves /healthz
        run: |
          docker run -d --name va -e PORT=8080 -p 8080:8080 voice-ai-agent:${{ github.sha }}
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:8080/healthz && break
            sleep 1
          done
          curl -sf http://127.0.0.1:8080/healthz | grep -q '"ok":true'
          docker rm -f va
