<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VANI — Your Voice Companion for the Constitution</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="is-idle">
  <!-- Config: defaults to same-origin (works when served from the backend at /ui).
       For a standalone host, set window.API_BASE to the backend before this loads. -->
  <script>window.API_BASE = window.API_BASE || (location.origin + "/api/v1");</script>

  <!-- state-tinted glow that fills the screen edges (green=listening, teal=speaking) -->
  <div class="ambient" aria-hidden="true"></div>

  <main class="stage">
    <h1 class="wordmark">VANI</h1>
    <p class="tagline">A&nbsp;VOICE&nbsp;ASSISTANT&nbsp;THAT&nbsp;KNOWS&nbsp;THE&nbsp;CONSTITUTION.</p>

    <!-- the whole interface: one microphone, driven by voice -->
    <div class="orb-wrap">
      <div class="ring ring-3" aria-hidden="true"></div>
      <div class="ring ring-2" aria-hidden="true"></div>
      <div class="ring ring-1" aria-hidden="true"></div>
      <button class="orb" id="mic" aria-label="Tap to talk">
        <svg class="mic" viewBox="0 0 200 300" role="img" aria-label="microphone">
          <defs>
            <radialGradient id="cap" cx="0.4" cy="0.35" r="0.85">
              <stop offset="0" stop-color="#eef0f2"/>
              <stop offset="0.6" stop-color="#9aa0a8"/>
              <stop offset="1" stop-color="#565a62"/>
            </radialGradient>
            <linearGradient id="steelDark" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0" stop-color="#767a82"/><stop offset="0.5" stop-color="#d4d7db"/><stop offset="1" stop-color="#767a82"/>
            </linearGradient>
            <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#eceef0"/><stop offset="0.5" stop-color="#63676e"/><stop offset="1" stop-color="#e4e6e9"/>
            </linearGradient>
          </defs>
          <rect x="55" y="20" width="90" height="150" rx="45" fill="url(#cap)" stroke="#4c4f56" stroke-width="1.5"/>
          <g stroke="#3d4046" stroke-width="1" opacity="0.45">
            <line x1="60" y1="55" x2="140" y2="55"/><line x1="58" y1="72" x2="142" y2="72"/>
            <line x1="58" y1="89" x2="142" y2="89"/><line x1="58" y1="106" x2="142" y2="106"/>
            <line x1="58" y1="123" x2="142" y2="123"/><line x1="60" y1="140" x2="140" y2="140"/>
          </g>
          <circle cx="100" cy="95" r="18" fill="none" stroke="#2c2e33" stroke-width="1.5" opacity="0.6"/>
          <text x="100" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#2c2e33" opacity="0.75">V</text>
          <path d="M40 120 q-14 60 25 92 M160 120 q14 60 -25 92" fill="none" stroke="url(#steelDark)" stroke-width="9" stroke-linecap="round"/>
          <rect x="92" y="205" width="16" height="45" fill="url(#steelDark)"/>
          <rect x="70" y="248" width="60" height="16" rx="8" fill="url(#steel)" stroke="#4c4f56" stroke-width="1"/>
        </svg>
      </button>
    </div>

    <!-- pipeline selector (small) -->
    <div class="mode" role="group" aria-label="pipeline">
      <button class="mode-btn is-active" data-mode="slow">Grounded</button>
      <button class="mode-btn" data-mode="fast">Realtime</button>
    </div>

    <!-- optional voice-only shortcuts: ask by tapping, answer is spoken (no text shown) -->
    <div class="pills" id="pills">
      <button class="pill" data-q="What does Article 21 guarantee?">Article 21</button>
      <button class="pill" data-q="What are the fundamental rights?">Fundamental rights</button>
      <button class="pill" data-q="What does the Preamble say?">The Preamble</button>
      <button class="pill" data-q="How is the President of India elected?">Electing the President</button>
    </div>
  </main>

  <footer class="foot" aria-hidden="true">
    <span id="conn" class="conn"></span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
