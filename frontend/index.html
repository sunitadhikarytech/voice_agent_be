<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VANI — Your Voice Companion for the Constitution</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Config: defaults to same-origin (works when served from the backend at /ui).
       For a standalone host, set window.API_BASE to the backend before this loads. -->
  <script>window.API_BASE = window.API_BASE || (location.origin + "/api/v1");</script>

  <main class="stage">
    <!-- Hero -->
    <section class="hero" id="hero">
      <h1 class="wordmark">VANI</h1>
      <p class="tagline">A&nbsp;VOICE&nbsp;ASSISTANT&nbsp;THAT&nbsp;KNOWS&nbsp;THE&nbsp;CONSTITUTION&nbsp;—&nbsp;JUST&nbsp;ASK.</p>

      <div class="console">
        <!-- left suggestion pills -->
        <div class="pills pills-left">
          <button class="pill" data-q="What does Article 21 guarantee?">WHAT DOES ARTICLE 21 GUARANTEE?</button>
          <button class="pill" data-q="What are the fundamental rights?">WHAT ARE THE FUNDAMENTAL RIGHTS?</button>
        </div>

        <!-- centre: the microphone -->
        <div class="mic-wrap">
          <div class="pulse" id="pulse" aria-hidden="true"></div>
          <svg class="mic" viewBox="0 0 200 300" role="img" aria-label="microphone">
            <defs>
              <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#e9e9ec"/>
                <stop offset="0.35" stop-color="#a9adb4"/>
                <stop offset="0.5" stop-color="#5f636b"/>
                <stop offset="0.65" stop-color="#b7bbc1"/>
                <stop offset="1" stop-color="#dfe1e5"/>
              </linearGradient>
              <linearGradient id="steelDark" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0" stop-color="#6b6f77"/>
                <stop offset="0.5" stop-color="#c9ccd1"/>
                <stop offset="1" stop-color="#6b6f77"/>
              </linearGradient>
              <radialGradient id="cap" cx="0.4" cy="0.35" r="0.8">
                <stop offset="0" stop-color="#d7dade"/>
                <stop offset="0.6" stop-color="#8b8f96"/>
                <stop offset="1" stop-color="#4c4f56"/>
              </radialGradient>
            </defs>
            <!-- capsule head -->
            <rect x="55" y="20" width="90" height="150" rx="45" fill="url(#cap)" stroke="#4c4f56" stroke-width="1.5"/>
            <!-- grille lines -->
            <g stroke="#3d4046" stroke-width="1" opacity="0.5">
              <line x1="60" y1="55" x2="140" y2="55"/><line x1="58" y1="72" x2="142" y2="72"/>
              <line x1="58" y1="89" x2="142" y2="89"/><line x1="58" y1="106" x2="142" y2="106"/>
              <line x1="58" y1="123" x2="142" y2="123"/><line x1="60" y1="140" x2="140" y2="140"/>
            </g>
            <!-- monogram -->
            <circle cx="100" cy="95" r="18" fill="none" stroke="#2c2e33" stroke-width="1.5" opacity="0.65"/>
            <text x="100" y="103" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="26" fill="#2c2e33" opacity="0.8">V</text>
            <!-- yoke -->
            <path d="M40 120 q-14 60 25 92 M160 120 q14 60 -25 92" fill="none" stroke="url(#steelDark)" stroke-width="9" stroke-linecap="round"/>
            <!-- neck + base -->
            <rect x="92" y="205" width="16" height="45" fill="url(#steelDark)"/>
            <rect x="70" y="248" width="60" height="16" rx="8" fill="url(#steel)" stroke="#4c4f56" stroke-width="1"/>
          </svg>

          <button class="start" id="talk" aria-label="Hold to talk">
            <span class="start-dot"></span>
            <span class="start-label" id="talkLabel">HOLD&nbsp;TO&nbsp;TALK</span>
          </button>
          <div class="mode">
            <button class="mode-btn is-active" data-mode="slow">Grounded</button>
            <button class="mode-btn" data-mode="fast">Realtime</button>
          </div>
        </div>

        <!-- right suggestion pills -->
        <div class="pills pills-right">
          <button class="pill" data-q="What does the Preamble say?">WHAT DOES THE PREAMBLE SAY?</button>
          <button class="pill" data-q="How is the President of India elected?">HOW IS THE PRESIDENT ELECTED?</button>
        </div>
      </div>

      <div class="scroll-cue" id="scrollCue" aria-hidden="true">⌄</div>
    </section>

    <!-- Conversation -->
    <section class="convo" id="convo" hidden>
      <div class="status" id="status">idle</div>
      <div class="thread" id="thread"></div>
      <button class="reset" id="reset">clear</button>
    </section>
  </main>

  <footer class="foot">
    <span id="conn" class="conn">connecting…</span>
    <span class="foot-note">Grounded in the Constitution of India · no answers invented</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
